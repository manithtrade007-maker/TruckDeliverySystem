services:
  - type: web
    name: truck-delivery-system
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: truck-delivery-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: HOST
        value: 0.0.0.0
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
